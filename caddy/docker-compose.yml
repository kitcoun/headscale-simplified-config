services:
  caddy:
    image: caddy:latest
    container_name: caddy
    env_file:
      - ../.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy/data:/data
    restart: always
    networks:
      - caddy_network

networks:
  caddy_network:
    external: true